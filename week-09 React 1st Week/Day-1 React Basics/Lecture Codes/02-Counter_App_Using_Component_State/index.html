<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Counter using Component & State</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
            padding: 1.5rem;
            margin: 0;
        }

        button {
            background: linear-gradient(105deg, #1e2b3c 0%, #0f1a24 100%);
            border: none;
            padding: 1rem 2.2rem;
            min-width: 240px;
            border-radius: 60px;
            cursor: pointer;
            font-size: 1.7rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            color: #ffffff;
            text-shadow: 0 1px 1px rgba(0,0,0,0.1);
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.2), 0 4px 8px rgba(0, 0, 0, 0.05), inset 0 1px 0 rgba(255,255,255,0.1);
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            outline: none;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button:hover {
            background: linear-gradient(115deg, #264a5e 0%, #122c3b 100%);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 20px 28px -12px rgba(0, 0, 0, 0.3), 0 2px 6px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.15);
        }

        button:active {
            transform: translateY(2px) scale(0.98);
            background: linear-gradient(105deg, #0f1f2c 0%, #07121b 100%);
            box-shadow: 0 6px 14px -6px rgba(0, 0, 0, 0.4), inset 0 1px 2px rgba(0,0,0,0.2);
            transition: 0.05s linear;
        }

        button:focus-visible {
            outline: 3px solid #3b82f6;
            outline-offset: 4px;
            border-radius: 60px;
        }

        @keyframes gentlePulse {
            0% {
                transform: scale(1);
                box-shadow: 0 12px 24px -8px rgba(0,0,0,0.2);
            }
            50% {
                transform: scale(1.02);
                box-shadow: 0 18px 28px -8px rgba(59,130,246,0.25);
                background: linear-gradient(115deg, #2c5570 0%, #143b4e 100%);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 12px 24px -8px rgba(0,0,0,0.2);
            }
        }

        @media (max-width: 500px) {
            button {
                font-size: 1.4rem;
                padding: 0.8rem 1.8rem;
                min-width: 200px;
            }
        }

        #buttonParent {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at 50% 30%, rgba(59,130,246,0.03) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
        }
        
        button {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <div id="buttonParent"></div>

    <script>
        let state = { count: 0 };

        function onButtonPress() {
            state.count++;
            buttonComponentRerender();
        }

        function buttonComponentRerender() {
            document.getElementById("buttonParent").innerHTML = "";
            const component = buttonComponent(state.count);
            document.getElementById("buttonParent").appendChild(component);
        }

        function buttonComponent(count) {
            const button = document.createElement("button");
            button.innerHTML = `Counter ${count}`;
            button.onclick = onButtonPress;
            return button;
        }

        buttonComponentRerender();
    </script>
</body>
</html>
